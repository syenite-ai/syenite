name: syenite-mcp
region: nyc
databases:
  - name: postgres
    engine: PG
    production: true
    cluster_name: syenite-db
    db_name: defaultdb
    db_user: doadmin
services:
  - name: mcp-server
    github:
      repo: syenite-ai/syenite
      branch: main
      deploy_on_push: true
    dockerfile_path: mcp/Dockerfile
    source_dir: mcp
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    routes:
      - path: /
    # App-Level env (set in DO Control Panel only): ALCHEMY_API_KEY, DASHBOARD_PASSWORD, SEED_API_KEY
    envs:
      - key: DATABASE_URL
        value: ${postgres.DATABASE_URL}
        scope: RUN_TIME
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: LIFI_INTEGRATOR
        value: syenite
      - key: LIFI_FEE
        value: "0.0015"
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
domains:
  - domain: syenite.ai
    type: PRIMARY
  - domain: www.syenite.ai
    type: ALIAS
